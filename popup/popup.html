<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>CalmCal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <div id="header">
      <div id="mascot-slot"></div>
      <div>
        <div id="app-name">CalmCal</div>
        <div id="app-status">Loading…</div>
      </div>
    </div>

    <div id="today-bar">
      <div id="today-label-row">
        <span class="label-sm">Today</span>
        <span class="muted">resets at midnight</span>
      </div>
      <div id="progress-track"><div id="progress-fill"></div></div>
      <div id="progress-label"></div>
    </div>

    <div id="settings">
      <div class="row">
        <div class="row-label">
          <div class="row-title">CalmCal</div>
          <div class="row-sub" id="enabled-sub">On — watching gently</div>
        </div>
        <div class="toggle" id="toggle-enabled">
          <div class="toggle-thumb"></div>
        </div>
      </div>
    </div>

    <div id="footer">
      <div id="footer-meta">
        <span>5 min check-in</span><span>·</span><span>15 min limit</span><span>·</span><span>local only</span>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
