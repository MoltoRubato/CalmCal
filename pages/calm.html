<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>CalmCal · Take a breath</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFF1F5; --primary: #F48FB1; --soft: #FFB6C9;
      --cream: #FCE4EC; --ink: #3D2B30; --plum: #9D4A6B;
    }

    body {
      font-family: Nunito, system-ui, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background: radial-gradient(circle at 30% 20%, var(--cream) 0%, var(--bg) 50%, var(--soft) 130%);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
      /* Mouse-position vars, normalized [-1..1]. Updated by JS via rAF. */
      --mx: 0; --my: 0;
    }

    /* ── slow drifting mesh layer ───────────────────────────────────── */
    .bg-mesh {
      position: absolute; inset: -25%;
      pointer-events: none; z-index: 0;
      opacity: 0.55;
      background:
        radial-gradient(at 30% 30%, var(--cream)   0px, transparent 50%),
        radial-gradient(at 75% 20%, var(--soft)    0px, transparent 55%),
        radial-gradient(at 20% 75%, var(--cream)   0px, transparent 50%),
        radial-gradient(at 80% 80%, var(--soft)    0px, transparent 55%),
        radial-gradient(at 50% 50%, #ffd9e4        0px, transparent 60%);
      animation: cc-mesh 90s linear infinite;
      will-change: transform;
    }
    @keyframes cc-mesh {
      from { transform: rotate(0deg)   scale(1.0); }
      50%  {                            transform: rotate(180deg) scale(1.08); }
      to   { transform: rotate(360deg) scale(1.0); }
    }

    /* ── blobs (parallax wrappers + slow drift) ─────────────────────── */
    .blob-wrap {
      position: absolute; pointer-events: none; z-index: 0;
      transition: transform .8s cubic-bezier(.2,.7,.2,1);
      will-change: transform;
    }
    .blob-wrap-1 { top: -120px; right: -120px;
      transform: translate3d(calc(var(--mx) * -22px), calc(var(--my) * -22px), 0); }
    .blob-wrap-2 { bottom: -160px; left: -100px;
      transform: translate3d(calc(var(--mx) * 34px), calc(var(--my) * 34px), 0); }
    .blob {
      border-radius: 50%; filter: blur(12px);
      animation: cc-blob 14s ease-in-out infinite alternate;
      will-change: transform;
    }
    .blob-1 { width: 380px; height: 380px; background: var(--cream); opacity: .6; }
    .blob-2 { width: 420px; height: 420px; background: var(--soft); opacity: .4; filter: blur(14px);
      animation-duration: 18s; animation-delay: -7s; }
    @keyframes cc-blob {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to   { transform: translate3d(20px, -16px, 0) scale(1.06); }
    }

    /* ── drifting petals (cherry-blossom feel) ──────────────────────── */
    #petals { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .petal {
      position: absolute; bottom: -24px;
      border-radius: 50%;
      animation: cc-rise linear infinite;
      will-change: transform, opacity;
      opacity: 0;
    }
    @keyframes cc-rise {
      0%   { transform: translate3d(0, 0, 0) rotate(0deg);                   opacity: 0; }
      10%  {                                                                  opacity: var(--peak, 0.5); }
      90%  {                                                                  opacity: var(--peak, 0.5); }
      100% { transform: translate3d(var(--drift, 0px), -110vh, 0) rotate(var(--spin, 240deg)); opacity: 0; }
    }

    /* ── click ripple ────────────────────────────────────────────────── */
    .ripple {
      position: absolute; pointer-events: none; z-index: 1;
      width: 24px; height: 24px; margin: -12px 0 0 -12px;
      border-radius: 50%;
      border: 2px solid var(--primary);
      opacity: 0.7;
      animation: cc-ripple 1.2s ease-out forwards;
    }
    @keyframes cc-ripple {
      to { transform: scale(18); opacity: 0; border-width: 0.5px; }
    }

    /* confetti dots (kept for the unlocked breather state) */
    .dot { position: absolute; border-radius: 50%; opacity: .55; pointer-events: none; }

    /* Respect users who prefer less motion: hold the picture still. */
    @media (prefers-reduced-motion: reduce) {
      .bg-mesh, .blob, .petal { animation: none; }
      .blob-wrap { transition: none; }
    }

    .content {
      text-align: center;
      max-width: 620px;
      padding: 40px;
      position: relative;
      z-index: 2;
    }

    #mascot-wrap { width: 180px; height: 180px; margin: 0 auto 24px; }

    .eyebrow {
      font-size: 13px; font-weight: 800; color: var(--plum);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(36px, 6vw, 52px);
      font-weight: 800; line-height: 1.05;
      letter-spacing: -1.2px; margin-bottom: 18px;
    }
    .sub {
      font-size: 19px; line-height: 1.55; color: #6B4A55;
      max-width: 480px; margin: 0 auto 36px;
    }

    /* breathing circle */
    #breath-wrap {
      position: relative; width: 200px; height: 200px;
      margin: 0 auto 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .ring {
      position: absolute; inset: 0; border-radius: 50%;
      background: var(--primary);
      animation: cc-breathe 8s ease-in-out infinite;
    }
    .ring-1 { opacity: .18; }
    .ring-2 { inset: 30px; opacity: .3; animation-delay: .6s; }

    #breath-text {
      position: relative; z-index: 2;
      font-size: 18px; font-weight: 700; color: var(--plum);
      transition: opacity .6s;
    }

    @keyframes cc-breathe {
      0%, 100% { transform: scale(.85); }
      50%       { transform: scale(1.15); }
    }

    /* actions */
    #actions { display: inline-flex; gap: 10px; }
    button {
      height: 36px; padding: 0 18px; border: none; border-radius: 18px;
      font-family: Nunito, system-ui, sans-serif;
      font-size: 13px; font-weight: 700; cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .82; }
    #btn-back  { background: var(--primary); color: #fff; }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="blob-wrap blob-wrap-1"><div class="blob blob-1"></div></div>
  <div class="blob-wrap blob-wrap-2"><div class="blob blob-2"></div></div>
  <div id="petals"></div>

  <div class="content">
    <div id="mascot-wrap"></div>

    <div class="eyebrow">✦ &nbsp;Clair Bear, calendar can wait&nbsp; ✦</div>
    <h1 id="headline">Breathe with bunny.</h1>
    <p class="sub">
      Take a moment with bunny. The week will hold itself together.
    </p>

    <div id="breath-wrap">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div id="breath-text">breathe in</div>
    </div>

    <div id="actions">
      <button id="btn-back">I'm ready, go back</button>
    </div>
  </div>

  <script src="calm.js"></script>
</body>
</html>
