<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>CalmCal · Welcome</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFF1F5; --primary: #F48FB1; --soft: #FFB6C9;
      --cream: #FCE4EC; --ink: #3D2B30; --plum: #9D4A6B;
    }
    body {
      font-family: Nunito, system-ui, sans-serif; color: var(--ink);
      min-height: 100vh;
      background: linear-gradient(165deg, var(--bg) 0%, var(--cream) 100%);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .dot { position: fixed; border-radius: 50%; opacity: .45; pointer-events: none; }

    .card {
      background: #fff; border-radius: 28px;
      box-shadow: 0 30px 80px -20px rgba(124,41,79,.3), 0 0 0 1px rgba(244,143,177,.12);
      padding: 40px; width: 480px; text-align: center;
      position: relative; z-index: 2;
      animation: cc-pop .4s cubic-bezier(.2,1.4,.4,1) both;
    }
    @keyframes cc-pop {
      from { transform: translateY(18px) scale(.95); opacity: 0; }
      to   { transform: translateY(0)   scale(1);   opacity: 1; }
    }
    .mascot-wrap { margin-bottom: 18px; display: flex; justify-content: center; }
    .eyebrow {
      font-size: 12px; font-weight: 800; color: var(--plum);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px;
    }
    h2 { font-size: 30px; font-weight: 800; line-height: 1.15; letter-spacing: -.6px; margin-bottom: 14px; }
    .body-text { font-size: 16px; color: #6B4A55; line-height: 1.55; margin-bottom: 24px; }

    .rule-list {
      list-style: none; text-align: left; margin: 0 auto 28px;
      max-width: 360px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .rule-list li {
      display: flex; align-items: flex-start; gap: 12px;
      font-size: 15px; color: var(--ink); line-height: 1.4;
    }
    .rule-list .num {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 14px;
      background: var(--bg); color: var(--plum);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800;
    }
    .rule-list strong { color: var(--plum); }

    .btn-primary {
      width: 100%; height: 50px; border: none; border-radius: 25px;
      background: var(--primary); color: #fff;
      font-family: Nunito, system-ui, sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-primary:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mascot-wrap" id="mascot"></div>
    <div class="eyebrow">✦ Hi Clair Bear, I'm CalmCal ✦</div>
    <h2>Stuck on ur calendar? O:  <br> I got u baby<br>(I hope this works)</h2>
    <p class="body-text">this guy will stop ya <3 </p>
    <ul class="rule-list">
      <li><span class="num">5</span><span> you get a reminder after <strong>5 minutes</strong></span></li>
      <li><span class="num">15</span><span>After <strong>15 minutes</strong> , we'll tuck away google calendar until tomorrow.</span></li>
    </ul>
    <button class="btn-primary" id="btn-finish">✨ Got it, take me to Calendar</button>
  </div>
  <script src="onboarding.js"></script>
</body>
</html>
